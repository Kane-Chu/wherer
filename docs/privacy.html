    <h1>隐私政策</h1>
    <p class="updated">更新日期：2026年5月16日</p>

    <h2>数据收集</h2>
    <p>「放哪」是一款注重隐私的物品管理应用。我们<strong>不会收集任何个人数据</strong>。</p>

    <h2>数据存储</h2>
    <p>所有物品数据均存储在您的设备本地，使用 Core Data 数据库。我们不会将您的数据上传到任何服务器。</p>

    <h2>权限使用</h2>
    <p>• <strong>相机/照片</strong>：仅用于为物品拍照，照片保存在本地<br>
    • <strong>无网络请求</strong>：应用不发起任何网络请求</p>

    <h2>第三方服务</h2>
    <p>本应用不使用任何第三方分析、广告或追踪服务。</p>

    <h2>联系我们</h2>
    <p>如有隐私相关问题，请通过 <a href="https://github.com/Kane-Chu/wherer/issues">GitHub Issues</a> 联系我们。</p>
